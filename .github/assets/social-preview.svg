<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="640" viewBox="0 0 1280 640">
	<defs>
		<radialGradient id="g1" cx="100%" cy="100%" r="80%">
			<stop offset="0%" stop-color="#e25a4a" stop-opacity="0.18"/>
			<stop offset="60%" stop-color="#e25a4a" stop-opacity="0.04"/>
			<stop offset="100%" stop-color="#e25a4a" stop-opacity="0"/>
		</radialGradient>
		<radialGradient id="g2" cx="0%" cy="0%" r="70%">
			<stop offset="0%" stop-color="#1a2235" stop-opacity="0.08"/>
			<stop offset="100%" stop-color="#1a2235" stop-opacity="0"/>
		</radialGradient>
		<linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#1a2235" stop-opacity="0"/>
			<stop offset="50%" stop-color="#1a2235" stop-opacity="0.18"/>
			<stop offset="100%" stop-color="#1a2235" stop-opacity="0"/>
		</linearGradient>
	</defs>

	<rect width="100%" height="100%" fill="#fbf8f3"/>
	<rect width="100%" height="100%" fill="url(#g1)"/>
	<rect width="100%" height="100%" fill="url(#g2)"/>

	<!-- Icon: dark rounded square + paperclip glyph -->
	<g transform="translate(108, 180)">
		<rect width="280" height="280" rx="52.5" fill="#18181b"/>
		<g transform="translate(52.5, 30.625) scale(7.288749999999999)">
			<path
				d="M15 7l-6.5 6.5a1.5 1.5 0 0 0 3 3l6.5 -6.5a3 3 0 0 0 -6 -6l-6.5 6.5a4.5 4.5 0 0 0 9 9l6.5 -6.5"
				stroke="#ffffff"
				stroke-width="2"
				stroke-linecap="round"
				stroke-linejoin="round"
				fill="none"
			/>
		</g>
	</g>

	<!-- Wordmark -->
	<text x="440" y="296"
		font-family="Inter" font-size="104" font-weight="800"
		fill="#1a2235" letter-spacing="-4">Paperclip Hub</text>

	<!-- Tagline -->
	<text x="444" y="354"
		font-family="Inter" font-size="32" font-weight="500"
		fill="#5a6478">The plugin directory for autonomous teams.</text>

	<!-- Pill: install command -->
	<g transform="translate(440, 400)">
		<rect width="468" height="56" rx="12" fill="#f4f0e8" stroke="#1a2235" stroke-opacity="0.10"/>
		<text x="24" y="36"
			font-family="Inter" font-size="22" font-weight="600"
			fill="#1a2235" letter-spacing="-0.2">
			<tspan fill="#5a6478">$ </tspan>paperclip plugin add <tspan fill="#e25a4a">&lt;name&gt;</tspan>
		</text>
	</g>

	<!-- Hairline divider -->
	<rect x="80" y="510" width="1120" height="1" fill="url(#rule)"/>

	<!-- Footer left -->
	<text x="108" y="560"
		font-family="Inter" font-size="22" font-weight="500"
		fill="#5a6478">Next.js 16 · Drizzle · Payload · Indexed nightly</text>

	<!-- Footer right -->
	<text x="1172" y="560" text-anchor="end"
		font-family="Inter" font-size="22" font-weight="700"
		fill="#1a2235">cliphub.fyi</text>
</svg>